<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="꽃집"> 
    <meta name="keywords" content="꽃, 꽃집, 꽃배달, 꽃다발, 플로리스트">
    <title>탄생화 만들기</title>
    <link rel="stylesheet" href="../styles/reset.css">
    <link rel="stylesheet" href="../styles/index.css">
    <script src="../scripts/index.js" defer></script>
</head>
<body>
    <div id="wrap">
        <main>
            <div class="flower">
                <p class="birth">The Flower of My Birth Day</p>
                <h1>나의 탄생화 찾기</h1>
            </div>
            <div class="month_myflower">
                <input type="text" name="month" id="month" placeholder="태어난 달을 숫자로 입력해주세요">
                <button type="button" name="myflower" id="myflower" onclick="openFlower()">나의 꽃과 꽃말 만나기</button>
            </div>
            <div class="open">
                <p class="top">birthday Month 12</p>
                <p class="meddle">꽃말 : 자기애, 자존심, 외로움</p>
                <p class="bottom">당신의 탄생화는 <em>'수선화'</em>입니다.</p>
            </div>
            <div class="flower_bg" onclick="closeFlower()"></div>
        </main>
    </div>
</body>
</html>
